name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build with pspdev
        run: |
          docker run --rm -v "$PWD:/build" pspdev/pspdev:latest \
            bash -c "psp-pacman -Sy --noconfirm sdl2 && cd /build && make"

      - name: Package release
        run: |
          mkdir -p release/PAPER
          cp EBOOT.PBP release/PAPER/
          cp README.md release/PAPER/
          cp -r assets release/PAPER/
          cd release && zip -r ../paper-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: paper-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}